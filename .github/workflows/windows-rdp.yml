name: Windows Cloud Remote Desktop

on:
  workflow_dispatch: # เปิดให้มีปุ่มกดสั่งรัน RDP ด้วยตัวเองจากหน้าเว็บ GitHub

jobs:
  remote-desktop:
    runs-on: windows-latest
    
    steps:
      # 1. ดึงโค้ดโปรเจกต์ลงเครื่องตามปกติ
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. เปิดระบบรีโมทด้วย tmate (เป็นระบบแชร์หน้าจอเทอร์มินัลและรีโมทที่ปลอดภัย)
      - name: Setup Tmate Session
        uses: mxschmitt/action-tmate@v3
        with:
          # สั่งให้เครื่องเปิดค้างไว้เพื่อรอเราเชื่อมต่อเข้าไป
          limit-access-to-actor: true
